<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- R1: Prism with Coin Core — diamond facets + center gold coin with "L" -->
  <defs>
    <linearGradient id="r1-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="r1-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="r1-deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="r1-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <radialGradient id="r1-coin" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="55%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="#0F172A"/>
  <polygon points="100,32 100,100 38,100" fill="url(#r1-light)"/>
  <polygon points="100,32 162,100 100,100" fill="url(#r1-mid)"/>
  <polygon points="38,100 100,100 100,168" fill="url(#r1-deep)"/>
  <polygon points="100,100 162,100 100,168" fill="url(#r1-shadow)"/>
  <circle cx="100" cy="100" r="24" fill="url(#r1-coin)"/>
  <circle cx="100" cy="100" r="23" fill="none" stroke="#92400E" stroke-width="0.6" opacity="0.55"/>
  <text x="100" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#0F172A">L</text>
</svg>
