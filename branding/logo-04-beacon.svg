<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 4: Beacon — circle (lumen/sun) emitting rays = guidance, AI insight -->
  <defs>
    <radialGradient id="lumenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="#0F172A"/>
  <!-- 8 rays -->
  <g stroke="#FCD34D" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="34" x2="100" y2="56"/>
    <line x1="100" y1="144" x2="100" y2="166"/>
    <line x1="34" y1="100" x2="56" y2="100"/>
    <line x1="144" y1="100" x2="166" y2="100"/>
    <line x1="53" y1="53" x2="68" y2="68"/>
    <line x1="132" y1="132" x2="147" y2="147"/>
    <line x1="53" y1="147" x2="68" y2="132"/>
    <line x1="132" y1="68" x2="147" y2="53"/>
  </g>
  <!-- Center lumen -->
  <circle cx="100" cy="100" r="32" fill="url(#lumenGlow)"/>
  <!-- Subtle inner highlight = "fi" finance hint -->
  <circle cx="100" cy="100" r="14" fill="#FFFFFF" opacity="0.25"/>
</svg>
