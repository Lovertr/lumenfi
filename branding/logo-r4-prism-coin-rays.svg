  <defs>
    <linearGradient id="r4-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="r4-mid" x1="0%" y1="0%" x2="100%" y2="100%">
