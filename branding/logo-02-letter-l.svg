<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept 2: Letter L morphing into ascending bars (chart) -->
  <rect width="200" height="200" rx="44" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <!-- L vertical stroke -->
  <rect x="48" y="44" width="22" height="100" rx="4" fill="#0F172A"/>
  <!-- Foot of L → first short bar -->
  <rect x="48" y="122" width="34" height="22" rx="4" fill="#0F172A"/>
  <!-- Ascending bars representing growth -->
  <rect x="90" y="100" width="22" height="44" rx="4" fill="#1E293B"/>
  <rect x="120" y="80" width="22" height="64" rx="4" fill="#3B82F6"/>
  <rect x="150" y="58" width="22" height="86" rx="4" fill="#F59E0B"/>
</svg>
