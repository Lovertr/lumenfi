<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Lumenfi — Official Logo (no-shine, black bg) -->
  <defs>
    <linearGradient id="lf-light" x1="20%" y1="20%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="55%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="lf-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="lf-deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </linearGradient>
    <linearGradient id="lf-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#1C0701"/>
    </linearGradient>
    <radialGradient id="lf-coin" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="40%" stop-color="#FCD34D"/>
      <stop offset="80%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#7C2D12"/>
    </radialGradient>
    <radialGradient id="lf-aura">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#FCD34D" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lf-spark">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" rx="44" fill="#000000"/>
  <circle cx="100" cy="100" r="88" fill="url(#lf-aura)"/>

  <g>
    <circle cx="50" cy="50" r="15" fill="url(#lf-spark)"/>
    <path d="M50 36 L52.5 47.5 L64 50 L52.5 52.5 L50 64 L47.5 52.5 L36 50 L47.5 47.5 Z" fill="#FFFBEB"/>
    <circle cx="150" cy="50" r="15" fill="url(#lf-spark)"/>
    <path d="M150 36 L152.5 47.5 L164 50 L152.5 52.5 L150 64 L147.5 52.5 L136 50 L147.5 47.5 Z" fill="#FFFBEB"/>
    <circle cx="50" cy="150" r="15" fill="url(#lf-spark)"/>
    <path d="M50 136 L52.5 147.5 L64 150 L52.5 152.5 L50 164 L47.5 152.5 L36 150 L47.5 147.5 Z" fill="#FFFBEB"/>
    <circle cx="150" cy="150" r="15" fill="url(#lf-spark)"/>
    <path d="M150 136 L152.5 147.5 L164 150 L152.5 152.5 L150 164 L147.5 152.5 L136 150 L147.5 147.5 Z" fill="#FFFBEB"/>
  </g>

  <polygon points="100,28 100,100 34,100" fill="url(#lf-light)"/>
  <polygon points="100,28 166,100 100,100" fill="url(#lf-mid)"/>
  <polygon points="34,100 100,100 100,172" fill="url(#lf-deep)"/>
  <polygon points="100,100 166,100 100,172" fill="url(#lf-shadow)"/>

  <polygon points="100,28 166,100 100,172 34,100" fill="none" stroke="#FCD34D" stroke-width="0.6" opacity="0.45"/>
  <line x1="100" y1="28" x2="100" y2="172" stroke="#FEF3C7" stroke-width="0.4" opacity="0.35"/>
  <line x1="34" y1="100" x2="166" y2="100" stroke="#FEF3C7" stroke-width="0.4" opacity="0.25"/>

  <circle cx="100" cy="100" r="38" fill="url(#lf-coin)"/>
  <circle cx="100" cy="100" r="36" fill="none" stroke="#451A03" stroke-width="0.8" opacity="0.6"/>
  <circle cx="100" cy="100" r="32.5" fill="none" stroke="#451A03" stroke-width="0.5" opacity="0.4"/>

  <text x="100" y="119" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#1C0701">L</text>

  <rect x="3" y="3" width="194" height="194" rx="41" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.3"/>
</svg>
